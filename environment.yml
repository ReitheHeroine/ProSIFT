name: prosift
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:

  # --- Runtime ---
  - python=3.12
  - openjdk=17                        # Required by Nextflow
  - nextflow

  # --- Core data handling (Phase 1+) ---
  - pandas>=2.0,<3
  - numpy>=1.26,<2
  - pyarrow                           # Parquet intermediates
  - pyyaml

  # --- HTTP / API (Phase 1 UniProt mapping, Phase 3 databases) ---
  - requests
  - tqdm                              # Progress bars for bulk API calls

  # --- R integration (Phase 2: DEqMS, limma) ---
  - r-base>=4.3
  - rpy2>=3.5
  - bioconductor-limma
  - bioconductor-deqms

  # --- Statistics (Phase 2+) ---
  - scipy>=1.12
  - scikit-learn                      # Imputation (KNN, iterative)

  # --- Enrichment analysis (Phase 2) ---
  - gseapy                            # ORA and GSEA via gseapy

  # --- Visualization (Phase 2 QC/EDA plots) ---
  - matplotlib
  - seaborn
  - plotly
  - python-kaleido                     # Static PNG export from Plotly figures (Module 02+)

  # --- Testing ---
  - pytest
  - pytest-cov
