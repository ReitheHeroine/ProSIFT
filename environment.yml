name: prosift
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:

  # --- Runtime ---
  - python=3.12
  - openjdk=17                        # Required by Nextflow
  - nextflow

  # --- Core data handling (Phase 1+) ---
  - pandas>=2.0,<3
  - numpy>=1.26,<2
  - pyarrow                           # Parquet intermediates
  - pyyaml

  # --- HTTP / API (Phase 1 UniProt mapping, Phase 3 databases) ---
  # requests also drives BioMart ortholog mapping (Phase 3, Module 01 Layer 2)
  # via the Ensembl BioMart XML REST endpoint -- no additional library needed.
  - requests
  - tqdm                              # Progress bars for bulk API calls

  # --- R integration (Phase 2: DEqMS, limma) ---
  - r-base>=4.3
  - rpy2>=3.5
  - bioconductor-limma
  - bioconductor-deqms

  # --- Statistics (Phase 2+) ---
  - scipy>=1.12
  - scikit-learn                      # Imputation (KNN, iterative)

  # --- Enrichment analysis (Phase 2) ---
  - gseapy                            # ORA and GSEA via gseapy
  - bioconductor-rrvgo                # GO-term redundancy reduction (Module 05, Section 4.13)
  - bioconductor-gosemsim             # Semantic similarity backend for rrvgo
  - bioconductor-go.db                # GO term DAG + MSigDB name-to-GO-ID lookup
  - bioconductor-org.mm.eg.db         # Mouse annotation database used by rrvgo

  # --- Visualization (Phase 2 QC/EDA plots) ---
  - matplotlib
  - seaborn
  - plotly
  - python-kaleido                     # Static PNG export from Plotly figures (Module 02+)

  # --- Testing ---
  - pytest
  - pytest-cov
