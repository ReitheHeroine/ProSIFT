<svg width="100%" viewBox="0 0 680 960" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  .th { font-size: 14px; font-weight: 500; }
  .ts { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
  .arr { stroke: #888780; stroke-width: 1.5; }
  .teal-fill { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
  .teal-title { fill: #085041; font-size: 14px; font-weight: 500; }
  .teal-sub { fill: #0F6E56; font-size: 12px; }
  .purple-fill { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
  .purple-title { fill: #3C3489; font-size: 14px; font-weight: 500; }
  .purple-sub { fill: #534AB7; font-size: 12px; }
  .coral-fill { fill: #FAECE7; stroke: #993C1D; stroke-width: 0.5; }
  .coral-title { fill: #712B13; font-size: 14px; font-weight: 500; }
  .coral-sub { fill: #993C1D; font-size: 12px; }
  .gray-fill { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5; }
  .gray-title { fill: #444441; font-size: 14px; font-weight: 500; }
  .gray-sub { fill: #5F5E5A; font-size: 12px; }
  .dashed-outline { fill: none; stroke: #888780; stroke-width: 0.5; stroke-dasharray: 6 4; }
  .diag-arrow { stroke: #B4B2A9; stroke-width: 0.5; stroke-dasharray: 4 3; }
  .fanout-line { stroke: #888780; stroke-width: 0.5; stroke-dasharray: 6 4; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-diag" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#B4B2A9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ROW 0: Input -->
<rect x="255" y="30" width="180" height="44" rx="8" class="gray-fill"/>
<text class="gray-title" x="345" y="56" text-anchor="middle" dominant-baseline="central">Input data</text>

<!-- Arrow: Input -> Module 01 -->
<line x1="345" y1="74" x2="345" y2="104" class="arr" marker-end="url(#arrow)"/>

<!-- ROW 1: Module 01 -->
<rect x="255" y="106" width="180" height="56" rx="8" class="teal-fill"/>
<text class="teal-title" x="345" y="126" text-anchor="middle" dominant-baseline="central">Module 01</text>
<text class="teal-sub" x="345" y="146" text-anchor="middle" dominant-baseline="central">Validation &amp; ID mapping</text>

<!-- Fork: Module 01 -> Module 03 (straight), Module 01 -> Module 02 (L-bend) -->
<line x1="345" y1="162" x2="345" y2="196" class="arr" marker-end="url(#arrow)"/>
<path d="M285 162 L285 180 L160 180 L160 196" fill="none" class="arr" marker-end="url(#arrow)"/>

<!-- ROW 2: Module 02 (left) + Module 03 (center) -->
<rect x="50" y="198" width="200" height="56" rx="8" class="teal-fill"/>
<text class="teal-title" x="150" y="218" text-anchor="middle" dominant-baseline="central">Module 02</text>
<text class="teal-sub" x="150" y="238" text-anchor="middle" dominant-baseline="central">Pre-normalization QC/EDA</text>

<rect x="265" y="198" width="160" height="56" rx="8" class="teal-fill"/>
<text class="teal-title" x="345" y="218" text-anchor="middle" dominant-baseline="central">Module 03</text>
<text class="teal-sub" x="345" y="238" text-anchor="middle" dominant-baseline="central">Normalization</text>

<!-- Arrow: Module 03 -> Module 04 -->
<line x1="345" y1="254" x2="345" y2="288" class="arr" marker-end="url(#arrow)"/>

<!-- ROW 3: Module 04 -->
<rect x="265" y="290" width="160" height="56" rx="8" class="teal-fill"/>
<text class="teal-title" x="345" y="310" text-anchor="middle" dominant-baseline="central">Module 04</text>
<text class="teal-sub" x="345" y="330" text-anchor="middle" dominant-baseline="central">Imputation</text>

<!-- Arrow: Module 04 -> Module 05 (main spine) -->
<line x1="345" y1="346" x2="345" y2="474" class="arr" marker-end="url(#arrow)"/>

<!-- ROW 3.5: QC Report Assembly (left) -->
<rect x="50" y="380" width="200" height="56" rx="8" class="teal-fill"/>
<text class="teal-title" x="150" y="400" text-anchor="middle" dominant-baseline="central">QC report assembly</text>
<text class="teal-sub" x="150" y="420" text-anchor="middle" dominant-baseline="central">Consolidated checkpoint</text>

<!-- Dashed: Module 02 -> QC RA -->
<line x1="150" y1="254" x2="150" y2="378" class="diag-arrow" marker-end="url(#arrow-diag)"/>
<!-- Dashed: Module 03 diagnostics -> QC RA -->
<path d="M265 236 L255 236 L255 408 L252 408" fill="none" class="diag-arrow" marker-end="url(#arrow-diag)"/>
<!-- Dashed: Module 04 diagnostics -> QC RA -->
<path d="M265 318 L258 318 L258 395 L252 395" fill="none" class="diag-arrow" marker-end="url(#arrow-diag)"/>

<!-- ROW 4: Module 05 -->
<rect x="255" y="476" width="180" height="56" rx="8" class="teal-fill"/>
<text class="teal-title" x="345" y="496" text-anchor="middle" dominant-baseline="central">Module 05</text>
<text class="teal-sub" x="345" y="516" text-anchor="middle" dominant-baseline="central">Diff. abundance</text>

<!-- Dynamic fanout line -->
<line x1="60" y1="550" x2="630" y2="550" class="fanout-line"/>
<text class="ts" x="345" y="568" text-anchor="middle">Dynamic fanout: significant protein IDs</text>

<!-- Fork: Module 05 -> Module 06 (left), Module 07 (right) -->
<path d="M300 532 L300 586 L180 586 L180 598" fill="none" class="arr" marker-end="url(#arrow)"/>
<path d="M390 532 L390 586 L530 586 L530 598" fill="none" class="arr" marker-end="url(#arrow)"/>

<!-- ROW 5: Module 06 (left) + Module 07 (right) -->
<rect x="70" y="600" width="180" height="56" rx="8" class="teal-fill"/>
<text class="teal-title" x="160" y="620" text-anchor="middle" dominant-baseline="central">Module 06</text>
<text class="teal-sub" x="160" y="640" text-anchor="middle" dominant-baseline="central">Enrichment (ORA + GSEA)</text>

<rect x="440" y="600" width="180" height="56" rx="8" class="purple-fill"/>
<text class="purple-title" x="530" y="620" text-anchor="middle" dominant-baseline="central">Module 07</text>
<text class="purple-sub" x="530" y="640" text-anchor="middle" dominant-baseline="central">Database queries (x5)</text>

<!-- Arrows: Module 06, 07 -> Module 08 -->
<path d="M200 656 L200 700 L345 700 L345 716" fill="none" class="arr" marker-end="url(#arrow)"/>
<path d="M500 656 L500 700 L347 700 L347 716" fill="none" class="arr" marker-end="url(#arrow)"/>

<!-- ROW 6: Module 08 -->
<rect x="255" y="718" width="180" height="56" rx="8" class="coral-fill"/>
<text class="coral-title" x="345" y="738" text-anchor="middle" dominant-baseline="central">Module 08</text>
<text class="coral-sub" x="345" y="758" text-anchor="middle" dominant-baseline="central">Results assembly (SQLite)</text>

<!-- Long-range dashed: QC flags -> Module 08 -->
<path d="M80 436 L80 740 L253 740" fill="none" class="diag-arrow" marker-end="url(#arrow-diag)"/>

<!-- Arrow: Module 08 -> Results Directory -->
<line x1="345" y1="774" x2="345" y2="808" class="arr" marker-end="url(#arrow)"/>

<!-- ROW 7: Results Directory -->
<rect x="255" y="810" width="180" height="44" rx="8" class="gray-fill"/>
<text class="gray-title" x="345" y="832" text-anchor="middle" dominant-baseline="central">Results directory</text>

<!-- Dashed: Results -> Frontend -->
<line x1="345" y1="854" x2="345" y2="888" class="diag-arrow" marker-end="url(#arrow-diag)"/>

<!-- ROW 8: Module 09 (dashed) -->
<rect x="255" y="890" width="180" height="56" rx="8" class="dashed-outline"/>
<text class="gray-title" x="345" y="910" text-anchor="middle" dominant-baseline="central">Module 09</text>
<text class="gray-sub" x="345" y="930" text-anchor="middle" dominant-baseline="central">Interactive frontend</text>

<!-- Legend -->
<rect x="460" y="30" width="12" height="12" rx="2" class="teal-fill"/>
<text class="ts" x="478" y="40">Analytical step</text>
<rect x="460" y="50" width="12" height="12" rx="2" class="purple-fill"/>
<text class="ts" x="478" y="60">Database operations</text>
<rect x="460" y="70" width="12" height="12" rx="2" class="coral-fill"/>
<text class="ts" x="478" y="80">Convergence / assembly</text>
<rect x="460" y="90" width="12" height="12" rx="2" class="gray-fill"/>
<text class="ts" x="478" y="100">Input / output</text>
<line x1="460" y1="116" x2="472" y2="116" class="diag-arrow"/>
<text class="ts" x="478" y="120">Diagnostic / long-range</text>

</svg>