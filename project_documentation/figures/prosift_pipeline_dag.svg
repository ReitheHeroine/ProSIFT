<line x1="340" y1="868" x2="340" y2="898" stroke="#B4B2A9" stroke-width="0.5" class="dash-wide" marker-end="url(#arrow)"/>

<rect x="190" y="900" width="300" height="44" rx="8" fill="none" stroke="#888780" stroke-width="0.5" class="dash-wide"/>
