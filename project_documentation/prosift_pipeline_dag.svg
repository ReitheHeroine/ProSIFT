<svg width="100%" viewBox="0 0 680 960" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: #ffffff;">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .box-gray { fill: #F1EFE8; stroke: #5F5E5A; }
    .box-teal { fill: #E1F5EE; stroke: #0F6E56; }
    .box-purple { fill: #EEEDFE; stroke: #534AB7; }
    .box-coral { fill: #FAECE7; stroke: #993C1D; }
    .title { font-size: 14px; font-weight: 500; }
    .subtitle { font-size: 12px; font-weight: 400; }
    .title-gray { fill: #2C2C2A; }
    .title-teal { fill: #085041; }
    .title-purple { fill: #3C3489; }
    .title-coral { fill: #712B13; }
    .sub-gray { fill: #5F5E5A; }
    .sub-teal { fill: #0F6E56; }
    .sub-purple { fill: #534AB7; }
    .sub-coral { fill: #993C1D; }
    .arr { stroke: #888780; stroke-width: 1.5; }
    .arr-light { stroke: #888780; stroke-width: 0.5; }
    .label-muted { font-size: 12px; fill: #888780; font-style: italic; }
    .dash { stroke-dasharray: 4 3; }
    .dash-wide { stroke-dasharray: 6 4; }
  </style>
</defs>

<!-- ============================================================ -->
<!-- TIER 0: Input files                                          -->
<!-- ============================================================ -->
<rect x="80" y="30" width="220" height="44" rx="8" class="box-gray" stroke-width="0.5"/>
<text class="title title-gray" x="190" y="52" text-anchor="middle" dominant-baseline="central">Abundance matrix</text>

<rect x="380" y="30" width="220" height="44" rx="8" class="box-gray" stroke-width="0.5"/>
<text class="title title-gray" x="490" y="52" text-anchor="middle" dominant-baseline="central">Metadata file</text>

<!-- Arrows: inputs -> validate -->
<line x1="190" y1="74" x2="280" y2="108" class="arr" marker-end="url(#arrow)"/>
<line x1="490" y1="74" x2="400" y2="108" class="arr" marker-end="url(#arrow)"/>

<!-- ============================================================ -->
<!-- TIER 1: Validate & ID Map                                    -->
<!-- ============================================================ -->
<rect x="160" y="110" width="360" height="56" rx="8" class="box-teal" stroke-width="0.5"/>
<text class="title title-teal" x="340" y="130" text-anchor="middle" dominant-baseline="central">Input validation &amp; ID mapping</text>
<text class="subtitle sub-teal" x="340" y="150" text-anchor="middle" dominant-baseline="central">UniProt bulk API, cache locally</text>

<!-- Fork point -->
<line x1="340" y1="166" x2="340" y2="182" class="arr-light"/>
<!-- Branch left to QC -->
<line x1="340" y1="182" x2="140" y2="210" class="arr" marker-end="url(#arrow)"/>
<!-- Branch right to Normalize -->
<line x1="340" y1="182" x2="490" y2="210" class="arr" marker-end="url(#arrow)"/>

<!-- ============================================================ -->
<!-- TIER 2: QC/EDA (left) | Normalization (right)                -->
<!-- ============================================================ -->
<rect x="40" y="212" width="200" height="56" rx="8" class="box-teal" stroke-width="0.5"/>
<text class="title title-teal" x="140" y="232" text-anchor="middle" dominant-baseline="central">QC / EDA module</text>
<text class="subtitle sub-teal" x="140" y="252" text-anchor="middle" dominant-baseline="central">Missingness, PCA, CVs</text>

<rect x="380" y="212" width="220" height="44" rx="8" class="box-teal" stroke-width="0.5"/>
<text class="title title-teal" x="490" y="234" text-anchor="middle" dominant-baseline="central">Normalization</text>

<!-- QC -> QC Report -->
<line x1="140" y1="268" x2="140" y2="298" class="arr" marker-end="url(#arrow)"/>
<!-- Normalize -> Impute -->
<line x1="490" y1="256" x2="490" y2="298" class="arr" marker-end="url(#arrow)"/>

<!-- ============================================================ -->
<!-- TIER 3: QC Report | Imputation                               -->
<!-- ============================================================ -->
<rect x="40" y="300" width="200" height="44" rx="8" class="box-gray" stroke-width="0.5"/>
<text class="title title-gray" x="140" y="322" text-anchor="middle" dominant-baseline="central">QC report + flags</text>

<rect x="380" y="300" width="220" height="56" rx="8" class="box-teal" stroke-width="0.5"/>
<text class="title title-teal" x="490" y="320" text-anchor="middle" dominant-baseline="central">Imputation</text>
<text class="subtitle sub-teal" x="490" y="340" text-anchor="middle" dominant-baseline="central">MinProb / KNN / left-censored</text>

<!-- Impute -> Diff Abundance -->
<line x1="490" y1="356" x2="400" y2="398" class="arr" marker-end="url(#arrow)"/>

<!-- ============================================================ -->
<!-- TIER 4: Differential Abundance (pivot)                       -->
<!-- ============================================================ -->
<rect x="190" y="400" width="300" height="56" rx="8" class="box-teal" stroke-width="0.5"/>
<text class="title title-teal" x="340" y="420" text-anchor="middle" dominant-baseline="central">Differential abundance</text>
<text class="subtitle sub-teal" x="340" y="440" text-anchor="middle" dominant-baseline="central">DEqMS / limma via rpy2</text>

<!-- Checkpoint divider -->
<text class="label-muted" x="340" y="480" text-anchor="middle">Snakemake checkpoint: significant proteins list</text>
<line x1="110" y1="488" x2="570" y2="488" stroke="#B4B2A9" stroke-width="0.5" class="dash"/>

<!-- Fork from checkpoint -->
<line x1="340" y1="456" x2="340" y2="496" class="arr-light"/>
<!-- Branch left to Enrichment -->
<line x1="340" y1="496" x2="145" y2="520" class="arr" marker-end="url(#arrow)"/>
<!-- Branch right to DB Queries -->
<line x1="340" y1="496" x2="480" y2="520" class="arr" marker-end="url(#arrow)"/>

<!-- ============================================================ -->
<!-- TIER 5: Enrichment (left) | DB Queries (right)               -->
<!-- ============================================================ -->
<rect x="30" y="522" width="230" height="56" rx="8" class="box-teal" stroke-width="0.5"/>
<text class="title title-teal" x="145" y="542" text-anchor="middle" dominant-baseline="central">Enrichment analysis</text>
<text class="subtitle sub-teal" x="145" y="562" text-anchor="middle" dominant-baseline="central">ORA + GSEA via gseapy</text>

<rect x="350" y="522" width="270" height="56" rx="8" class="box-purple" stroke-width="0.5"/>
<text class="title title-purple" x="485" y="542" text-anchor="middle" dominant-baseline="central">Database queries</text>
<text class="subtitle sub-purple" x="485" y="562" text-anchor="middle" dominant-baseline="central">Parallelized per protein</text>

<!-- DB detail box (dashed container) -->
<line x1="485" y1="578" x2="485" y2="598" class="arr" marker-end="url(#arrow)"/>
<rect x="350" y="600" width="270" height="80" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5" class="dash"/>
<text class="subtitle sub-purple" x="380" y="622" dominant-baseline="central">UniProt</text>
<text class="subtitle sub-purple" x="380" y="642" dominant-baseline="central">PubMed E-utilities</text>
<text class="subtitle sub-purple" x="380" y="662" dominant-baseline="central">DisGeNET</text>
<text class="subtitle sub-purple" x="520" y="622" dominant-baseline="central">DGIdb</text>
<text class="subtitle sub-purple" x="520" y="642" dominant-baseline="central">CTD</text>

<!-- ============================================================ -->
<!-- Long-range dependency: QC flags -> Profile Assembly          -->
<!-- ============================================================ -->
<path d="M140 344 L140 700 L200 730" fill="none" stroke="#B4B2A9" stroke-width="0.5" class="dash" marker-end="url(#arrow)"/>
<text class="label-muted" x="80" y="540">QC flags</text>

<!-- Enrichment -> Profile Assembly -->
<line x1="145" y1="578" x2="260" y2="728" class="arr" marker-end="url(#arrow)"/>
<!-- DB Queries -> Profile Assembly -->
<line x1="485" y1="680" x2="420" y2="728" class="arr" marker-end="url(#arrow)"/>

<!-- ============================================================ -->
<!-- TIER 6: Profile Assembly                                     -->
<!-- ============================================================ -->
<rect x="100" y="730" width="480" height="56" rx="8" class="box-coral" stroke-width="0.5"/>
<text class="title title-coral" x="340" y="750" text-anchor="middle" dominant-baseline="central">Profile assembly</text>
<text class="subtitle sub-coral" x="340" y="770" text-anchor="middle" dominant-baseline="central">Protein profiles (JSON) + biological process profiles</text>

<!-- Profile Assembly -> Results -->
<line x1="340" y1="786" x2="340" y2="820" class="arr" marker-end="url(#arrow)"/>

<!-- ============================================================ -->
<!-- TIER 7: Structured Results Directory                         -->
<!-- ============================================================ -->
<rect x="150" y="822" width="380" height="56" rx="8" class="box-gray" stroke-width="0.5"/>
<text class="title title-gray" x="340" y="842" text-anchor="middle" dominant-baseline="central">Structured results directory</text>
<text class="subtitle sub-gray" x="340" y="862" text-anchor="middle" dominant-baseline="central">Parquet + CSV + JSON + HTML plots</text>

<!-- Results -> Frontend (dashed, future) -->
<line x1="340" y1="878" x2="340" y2="908" stroke="#B4B2A9" stroke-width="0.5" class="dash" marker-end="url(#arrow)"/>

<!-- ============================================================ -->
<!-- TIER 8: Frontend (future, dashed outline)                    -->
<!-- ============================================================ -->
<rect x="190" y="910" width="300" height="44" rx="8" fill="none" stroke="#888780" stroke-width="0.5" class="dash-wide"/>
<text class="label-muted" x="340" y="932" text-anchor="middle" dominant-baseline="central">Interactive frontend (Phase 4)</text>

</svg>